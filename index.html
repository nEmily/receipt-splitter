    @keyframes twinkle    { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(0.6);opacity:0.4} }
    @keyframes flashFade  { 0%{opacity:0.9} 100%{opacity:0} }
    @keyframes popIn      { 0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.12);opacity:1} 100%{transform:scale(1)} }

      0%,100%{transform:translate(0,0) scale(0.6) rotate(0deg);opacity:0.3}
      50%{transform:translate(var(--dx,0),var(--dy,0)) scale(1.1) rotate(20deg);opacity:1}

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ─── Config (localStorage) ───────────────────────────────────────
function getConfig() {
  return {
    name: localStorage.getItem('rs_name') || '',
    backendUrl: localStorage.getItem('rs_backend_url') || '',
  };
}
function isValidBackendUrl(url) {
  if (!url) return true; // blank is allowed (offline-only mode)
  try {
    const u = new URL(url);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch { return false; }
}
function saveConfig(name, backendUrl) {
  const trimmed = backendUrl.trim();
  if (trimmed && !isValidBackendUrl(trimmed)) return; // silently reject invalid URLs
  localStorage.setItem('rs_name', name.trim());
  localStorage.setItem('rs_backend_url', trimmed);
}

// ═══════════════════════════════════════════════════════════════════
// DESIGN SYSTEM — Charcoal + Sakura palette
// ═══════════════════════════════════════════════════════════════════
const P = {
  bg: '#1A1A22', bg2: '#24242F', surface: '#2E2E3C', surfaceHi: '#3A3A4B',
  primary: '#FFC2D4', primaryInk: '#2A0F1E',
  accent: '#B8E6D2', accent2: '#FFD6E5',
  ink: '#F5EEF2', inkDim: 'rgba(245,238,242,0.62)', inkFaint: 'rgba(245,238,242,0.3)',
  good: '#B8E6D2', warn: '#FFE082',

// ─── Mascot ──────────────────────────────────────────────────────
function SushiFace({ mood, ink, cheek, cx = 32 }) {
  return <>
    <ellipse cx={cx-12} cy="44" rx="3.5" ry="2.2" fill={cheek} opacity="0.7"/>
    <ellipse cx={cx+12} cy="44" rx="3.5" ry="2.2" fill={cheek} opacity="0.7"/>
    {mood === 'sleep' ? <>
      <path d={`M${cx-10} 40 Q${cx-7} 38,${cx-4} 40`} stroke={ink} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
      <path d={`M${cx+4} 40 Q${cx+7} 38,${cx+10} 40`} stroke={ink} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
    </> : mood === 'wow' ? <>
      <ellipse cx={cx-7} cy="40" rx="1.8" ry="2.6" fill={ink}/>
      <ellipse cx={cx+7} cy="40" rx="1.8" ry="2.6" fill={ink}/>
      <circle cx={cx-6.5} cy="39" r="0.6" fill="#fff"/>
      <circle cx={cx+7.5} cy="39" r="0.6" fill="#fff"/>

      <circle cx={cx-7} cy="40" r="1.8" fill={ink}/>
      <circle cx={cx+7} cy="40" r="1.8" fill={ink}/>
      <circle cx={cx-6.5} cy="39.3" r="0.5" fill="#fff"/>
      <circle cx={cx+7.5} cy="39.3" r="0.5" fill="#fff"/>

    <path d={`M${cx-3} 46 Q${cx} 49,${cx+3} 46`} stroke={ink} strokeWidth="1.5" fill="none" strokeLinecap="round"/>

    <svg width={size} height={size} viewBox="0 0 64 64" style={{ overflow: 'visible' }}>

      <path d="M12 28 Q28 22,52 28" stroke={salmonLight} strokeWidth="2.4" fill="none" strokeLinecap="round"/>

function Sparkle({ size=12, color, style }) {

}
function Heart({ size=10, color, style }) {
  return <svg width={size} height={size} viewBox="0 0 10 10" style={style}>
    <path d="M5 9 L1 4.5 Q-0.5 2,2 1 Q4 0.5,5 2.5 Q6 0.5,8 1 Q10.5 2,9 4.5 Z" fill={color}/>

}
function StarDot({ size=8, color, style }) {
  return <svg width={size} height={size} viewBox="0 0 8 8" style={style}>

// ─── Shared UI ───────────────────────────────────────────────────
function StatusBar() {
  return <div style={{ height: 'env(safe-area-inset-top, 0px)', flexShrink: 0 }}/>;
}

function SparkleField({ density = 'med' }) {
  if (density === 'low') return null;
  const count = density === 'high' ? 52 : 28;
  const items = useMemo(() => {
    const arr = [], r = (() => { let s=42; return () => { s=(s*9301+49297)%233280; return s/233280; }; })();
    for (let i=0; i<count; i++) {
      const isH = density === 'high';
      arr.push({
        x: r()*100, y: r()*100,
        size: (isH ? 8 : 5) + r()*(isH ? 14 : 10),
        color: [P.primary, P.accent, P.accent2][Math.floor(r()*3)],
        kind: r()>0.55 ? 'sparkle' : r()>0.25 ? 'heart' : 'dot',
        rot: r()*360, opacity: (isH ? 0.45 : 0.35) + r()*(isH ? 0.45 : 0.4),
        driftX: (r()-0.5)*6, driftY: (r()-0.5)*8,
        dur: 1.6+r()*2.4, delay: r()*2.5,
      });
    }
    return arr;
  }, [count, density]);
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden' }}>
      {items.map((it,i) => (
        <div key={i} style={{
          position:'absolute', left:`${it.x}%`, top:`${it.y}%`,
          transform:`rotate(${it.rot}deg)`, opacity:it.opacity,
          animation:`twinkleDrift ${it.dur}s ease-in-out infinite ${it.delay}s`,
          '--dx': `${it.driftX}px`, '--dy': `${it.driftY}px`,
        }}>
          {it.kind === 'sparkle' && <Sparkle size={it.size} color={it.color}/>}
          {it.kind === 'heart'   && <Heart   size={it.size} color={it.color}/>}
          {it.kind === 'dot'     && <StarDot size={it.size} color={it.color}/>}
        </div>
      ))}
    </div>
  );
}

function KawaiiButton({ children, onClick, variant='primary', disabled, style, size='lg' }) {
  const isPrimary = variant === 'primary';
  const bg  = disabled ? P.surface  : isPrimary ? P.primary : 'transparent';
  const ink = disabled ? P.inkFaint : isPrimary ? P.primaryInk : P.ink;
  const pY  = size === 'lg' ? 18 : 12;
  const pX  = size === 'lg' ? 28 : 20;
  const fs  = size === 'lg' ? 19 : 16;
  return (
    <button
      onClick={disabled ? undefined : onClick}
      style={{
        padding: `${pY}px ${pX}px`, borderRadius: 9999,
        border: isPrimary ? 'none' : `2px solid ${P.surfaceHi}`,
        background: bg, color: ink,
        fontFamily: '"Nunito",system-ui', fontWeight: 900, fontSize: fs,
        letterSpacing: 0.2, cursor: disabled ? 'not-allowed' : 'pointer',
        boxShadow: isPrimary && !disabled ? `0 6px 0 0 ${P.primaryInk}22,0 8px 20px ${P.primary}40` : 'none',
        transition: 'transform 120ms,box-shadow 120ms', outline: 'none', width: '100%',
        ...style,
      }}
      onPointerDown={e => { if (!disabled) e.currentTarget.style.transform = 'translateY(2px)'; }}
      onPointerUp={e   => { if (!disabled) e.currentTarget.style.transform = 'translateY(0)'; }}
      onPointerLeave={e=> { if (!disabled) e.currentTarget.style.transform = 'translateY(0)'; }}
    >{children}</button>
  );
}

function BackButton({ onClick, light }) {

function FieldInput({ label, value, onChange, placeholder, type='text', hint }) {

// ═══════════════════════════════════════════════════════════════════
// INDEXEDDB — offline queue
// ═══════════════════════════════════════════════════════════════════
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open('receipt-splitter-v1', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('receipts')) {
        const store = db.createObjectStore('receipts', { keyPath: 'id' });
        store.createIndex('status', 'status', { unique: false });
      }
    };
    req.onsuccess = () => { _db = req.result; res(_db); };
    req.onerror  = () => rej(req.error);
  });
}
async function dbPut(record) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readwrite');
    tx.objectStore('receipts').put(record);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
async function dbCountByStatus(status) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readonly');
    const req = tx.objectStore('receipts').index('status').count(status);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function dbGetPending() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('receipts', 'readonly');
    const req = tx.objectStore('receipts').index('status').getAll('pending');
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

// ═══════════════════════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════════════════════
async function uploadReceipt(record, backendUrl) {
  if (!backendUrl) return;
  const parts = record.photo.split(',');
  if (parts.length < 2) throw new Error('Invalid photo data URL');
  const [header, b64] = parts;
  const mimeMatch = header.match(/:(.*?);/);
  if (!mimeMatch) throw new Error('Cannot parse photo MIME type');
  const mime = mimeMatch[1];
  const form = new FormData();
  const bytes = atob(b64);
  const ia = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) ia[i] = bytes.charCodeAt(i);
  form.append('photo', new Blob([ia], { type: mime }), `${record.id}.jpg`);
  form.append('metadata', JSON.stringify({
    id: record.id,
    timestamp: record.timestamp,
    description: record.description,
    photo: `${record.id}.jpg`,
    status: 'QUEUED',
  }));
  const res = await fetch(`${backendUrl}/upload`, { method: 'POST', body: form });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function syncPendingIfOnline(backendUrl) {
  if (!navigator.onLine || !backendUrl) return 0;
  const pending = await dbGetPending();
  let n = 0;
  for (const r of pending) {
    try {
      await uploadReceipt(r, backendUrl);
      await dbPut({ ...r, status: 'uploaded' });
      n++;
    } catch (e) {
      console.warn('Sync failed for', r.id, e.message);
    }
  }
  return n;
}

// SCREEN: ONBOARDING
// ═══════════════════════════════════════════════════════════════════
function OnboardingScreen({ onDone }) {
  const [name, setName] = useState('');
  const [serverUrl, setServerUrl] = useState('');
  const canSave = name.trim().length >= 1;

  const handleSave = () => {
    if (!canSave) return;
    saveConfig(name, serverUrl);
    onDone();
  };

  return (
    <div style={{
      position:'absolute', inset:0,
      background:`radial-gradient(120% 80% at 50% -10%,${P.bg2} 0%,${P.bg} 70%)`,
      display:'flex', flexDirection:'column',
    }}>
      <StatusBar/>
      <SparkleField density="med"/>

      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative', zIndex:2, padding:'0 28px', gap:6, overflowY:'auto' }}>
        <div style={{ animation:'bob 3.2s ease-in-out infinite', marginBottom:4 }}>
          <Sushi size={96} mood="wow"/>
        </div>
        <div style={{ textAlign:'center', marginBottom:20 }}>
          <div style={{ fontSize:28, fontWeight:900, color:P.ink, letterSpacing:-0.5, lineHeight:1.1 }}>hi there ♡</div>
          <div style={{ fontSize:14, color:P.inkDim, marginTop:6, fontWeight:600 }}>quick setup, then we're off</div>
        </div>

        <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:14 }}>
          <FieldInput
            label="your name"
            value={name}
            onChange={setName}
            placeholder="e.g. alex"
            hint="how we'll greet you on the home screen"
          />
          <FieldInput
            label="server url"
            value={serverUrl}
            onChange={setServerUrl}
            placeholder="https://100.x.x.x:5555"
            hint="your Tailscale receipt server — you can skip this and add it later in settings ⚙"
          />
        </div>
      </div>

      <div style={{ padding:'0 24px', paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 32px)', position:'relative', zIndex:2 }}>
        <KawaiiButton onClick={handleSave} disabled={!canSave}>
          {canSave ? "let's go ♡" : "enter your name first"}
        </KawaiiButton>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN: SETTINGS
// ═══════════════════════════════════════════════════════════════════
function SettingsScreen({ currentConfig, onSave, onBack }) {
  const [name, setName] = useState(currentConfig.name);
  const [serverUrl, setServerUrl] = useState(currentConfig.backendUrl);
  const canSave = name.trim().length >= 1;

  const handleSave = () => {
    if (!canSave) return;
    saveConfig(name, serverUrl);
    onSave({ name: name.trim(), backendUrl: serverUrl.trim() });
  };

  return (
    <div style={{
      position:'absolute', inset:0,
      background:`linear-gradient(180deg,${P.bg2} 0%,${P.bg} 60%)`,
      display:'flex', flexDirection:'column',
    }}>
      <StatusBar/>

      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'6px 16px 12px', flexShrink:0 }}>
        <BackButton onClick={onBack}/>
        <div style={{ fontSize:20, fontWeight:900, color:P.ink, letterSpacing:-0.3 }}>settings</div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'4px 20px 0', display:'flex', flexDirection:'column', gap:16 }}>

        <div style={{ padding:20, borderRadius:20, background:P.surface, border:`1.5px solid ${P.surfaceHi}`, display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ fontSize:11, fontWeight:900, color:P.inkDim, textTransform:'uppercase', letterSpacing:1 }}>profile</div>
          <FieldInput label="your name" value={name} onChange={setName} placeholder="alex"/>
        </div>

        <div style={{ padding:20, borderRadius:20, background:P.surface, border:`1.5px solid ${P.surfaceHi}`, display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ fontSize:11, fontWeight:900, color:P.inkDim, textTransform:'uppercase', letterSpacing:1 }}>server</div>
          <FieldInput
            label="tailscale url"
            value={serverUrl}
            onChange={setServerUrl}
            placeholder="https://100.x.x.x:5555"
            hint="the Flask server running on your home computer. leave blank to queue receipts locally only."
          />
          {serverUrl && (
            <div style={{ fontSize:11, color:P.inkFaint, fontWeight:600 }}>
              → uploads to {serverUrl}/upload
            </div>
          )}
        </div>

        <div style={{ padding:16, borderRadius:16, background:P.surface, border:`1px solid ${P.surfaceHi}` }}>
          <div style={{ fontSize:12, color:P.inkFaint, fontWeight:600, lineHeight:1.7 }}>
            <span style={{ color:P.inkDim, fontWeight:800 }}>how it works</span><br/>

      <div style={{ padding:'12px 20px', paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 28px)', flexShrink:0 }}>
        <KawaiiButton onClick={handleSave} disabled={!canSave}>save</KawaiiButton>
      </div>
    </div>
  );
}

            stroke={color} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function HomeScreen({ pendingCount, isOnline, onNew, onSettings, name }) {
  const hasPending = pendingCount > 0;

  const onlineWithPending  = isOnline && hasPending;

  return (
    <div style={{

      <SparkleField density="med"/>

          <div style={{ animation:'bob 3.2s ease-in-out infinite' }}>
            <Sushi size={140} mood={offlineWithPending ? 'sleep' : 'happy'}/>

          </div>
          <div style={{ position:'absolute', bottom:-4, right:10, animation:'floatSway 3s ease-in-out infinite 0.2s' }}>

// SCREEN: CAMERA
// ═══════════════════════════════════════════════════════════════════
function CornerBrackets({ color }) {
  const sz=24, off=56;
  const corners = {
    tl: { top:off, left:off,    borderTop:`2.5px solid ${color}`, borderLeft:`2.5px solid ${color}`,  borderRadius:'8px 0 0 0' },
    tr: { top:off, right:off,   borderTop:`2.5px solid ${color}`, borderRight:`2.5px solid ${color}`, borderRadius:'0 8px 0 0' },
    bl: { bottom:off, left:off, borderBottom:`2.5px solid ${color}`, borderLeft:`2.5px solid ${color}`,  borderRadius:'0 0 0 8px' },
    br: { bottom:off, right:off,borderBottom:`2.5px solid ${color}`, borderRight:`2.5px solid ${color}`, borderRadius:'0 0 8px 0' },
  };
  return <>{Object.entries(corners).map(([k,s]) =>
    <div key={k} style={{ position:'absolute', width:sz, height:sz, opacity:0.75, ...s }}/>
  )}</>;
}

function CameraScreen({ onCapture, onBack, onPermissionDenied }) {
  const videoRef  = useRef(null);
  const streamRef = useRef(null);
  const [ready,    setReady]    = useState(false);
  const [captured, setCaptured] = useState(false);
  const [photo,    setPhoto]    = useState(null);
  const [flash,    setFlash]    = useState(false);

  useEffect(() => {
    let alive = true;
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1440 } },
      audio: false,
    })
    .then(stream => {
      if (!alive) { stream.getTracks().forEach(t => t.stop()); return; }
      streamRef.current = stream;
      const vid = videoRef.current;
      if (vid) { vid.srcObject = stream; vid.play().then(() => setReady(true)).catch(() => setReady(true)); }
    })
    .catch(err => { console.error('Camera:', err); if (alive) onPermissionDenied(); });
    return () => { alive = false; stopStream(); };
  }, []);

  const stopStream = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  };
  const shoot = () => {
    const vid = videoRef.current;
    if (!vid || !ready) return;
    setFlash(true);
    setTimeout(() => setFlash(false), 280);
    const canvas = document.createElement('canvas');
    canvas.width = vid.videoWidth || 1280;
    canvas.height = vid.videoHeight || 960;
    canvas.getContext('2d').drawImage(vid, 0, 0);
    const data = canvas.toDataURL('image/jpeg', 0.87);
    setTimeout(() => { setPhoto(data); setCaptured(true); }, 120);
  };
  const retake  = () => { setPhoto(null); setCaptured(false); };
  const confirm = () => { stopStream(); onCapture(photo); };
  const goBack  = () => { stopStream(); onBack(); };

  return (
    <div style={{ position:'absolute', inset:0, background:'#080509', overflow:'hidden' }}>
      <video ref={videoRef} autoPlay playsInline muted style={{
        position:'absolute', inset:0, opacity: (!captured && ready) ? 1 : 0, transition:'opacity 400ms',
      }}/>
      {captured && photo && <img src={photo} style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }}/>}

      {!ready && !captured && (
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ textAlign:'center', color:'rgba(255,255,255,0.5)' }}>
            <div style={{ animation:'bob 1.2s ease-in-out infinite', marginBottom:12 }}><Sushi size={64} mood="sleep"/></div>
            <div style={{ fontWeight:700, fontSize:14 }}>waking up camera…</div>
          </div>
        </div>
      )}

      <div style={{ position:'absolute', inset:0, pointerEvents:'none',
        background:'linear-gradient(to bottom,rgba(0,0,0,0.45) 0%,transparent 22%,transparent 65%,rgba(0,0,0,0.65) 100%)'
      }}/>

      <div style={{
        position:'absolute', top:0, left:0, right:0, zIndex:10,
        paddingTop:'max(env(safe-area-inset-top,14px),14px)',
        display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 18px',
      }}>
        <BackButton onClick={goBack} light/>
        {ready && !captured && (
          <div style={{ padding:'8px 14px', borderRadius:9999, background:'rgba(0,0,0,0.5)', color:'#fff', fontSize:13, fontWeight:700, backdropFilter:'blur(10px)' }}>
            point at the receipt ✨
          </div>
        )}
        {captured && (
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:9999, background:P.good, color:'#0A2010', fontSize:13, fontWeight:800, animation:'popIn 300ms cubic-bezier(.2,1.4,.3,1)' }}>
            <Sparkle size={10} color="#0A2010"/> got it!
          </div>
        )}
        <span style={{ width:40 }}/>
      </div>

      {!captured && ready && <CornerBrackets color={P.primary}/>}

      <div style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:10,
        paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 36px)', paddingTop:20 }}>
        {!captured ? (
          <div style={{ display:'flex', justifyContent:'center' }}>
            <button onClick={shoot} disabled={!ready} style={{
              width:86, height:86, borderRadius:999, border:'4px solid #fff', background:'transparent',
              cursor: ready ? 'pointer' : 'not-allowed', padding:5, opacity: ready ? 1 : 0.4,
              display:'flex', alignItems:'center', justifyContent:'center',
            }}>
              <div style={{ width:'100%', height:'100%', borderRadius:999, background:P.primary,
                boxShadow:`0 0 20px ${P.primary}80`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Heart size={22} color={P.primaryInk}/>
              </div>
            </button>
          </div>
        ) : (
          <div style={{ display:'flex', gap:10, padding:'0 20px' }}>
            <button onClick={retake} style={{
              flex:1, padding:'16px', borderRadius:9999, background:'rgba(0,0,0,0.55)', color:'#fff',
              border:'2px solid rgba(255,255,255,0.3)', fontFamily:'"Nunito",system-ui', fontWeight:800, fontSize:16,
              cursor:'pointer', backdropFilter:'blur(10px)',
            }}>retake</button>
            <button onClick={confirm} style={{
              flex:1.5, padding:'16px', borderRadius:9999, background:P.primary, color:P.primaryInk,
              border:'none', fontFamily:'"Nunito",system-ui', fontWeight:900, fontSize:16,
              cursor:'pointer', boxShadow:`0 8px 20px ${P.primary}55`,
            }}>looks good →</button>
          </div>
        )}
      </div>

      {flash && <div style={{ position:'absolute', inset:0, background:'#fff', opacity:0.9, zIndex:30, pointerEvents:'none', animation:'flashFade 280ms ease-out forwards' }}/>}
    </div>
  );
}

  useEffect(() => { setTimeout(() => taRef.current?.focus(), 350); }, []);

  const handleSave = async () => {

    setSaving(true);
    await onSave(text);

  return (
    <div style={{ position:'absolute', inset:0, background:`linear-gradient(180deg,${P.bg2} 0%,${P.bg} 60%)`, display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ display:'flex', alignItems:'center', gap:12, padding:'6px 16px 10px', flexShrink:0 }}>

        {photo && (
          <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, padding:'6px 12px 6px 6px', borderRadius:18, background:P.surface, border:`1px solid ${P.surfaceHi}` }}>
            <div style={{ width:46, height:62, borderRadius:8, overflow:'hidden', flexShrink:0 }}>
              <img src={photo} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
            </div>
            <div>
              <div style={{ fontSize:14, fontWeight:800, color:P.ink }}>receipt</div>
              <div style={{ fontSize:11, color:P.inkDim, fontWeight:600 }}>just captured</div>
            </div>
          </div>
        )}
      </div>
      <div style={{ padding:'8px 24px 10px', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <div style={{ position:'relative', display:'inline-flex' }}>
          <div style={{ position:'absolute', inset:-10, borderRadius:999, background:`radial-gradient(circle,${P.primary}55 0%,transparent 70%)`, filter:'blur(4px)', pointerEvents:'none' }}/>
          <div style={{ position:'relative' }}><Sushi size={44} mood="happy"/></div>
        </div>
        <div>
          <div style={{ fontSize:22, fontWeight:900, color:P.ink, lineHeight:1.1, letterSpacing:-0.3 }}>who split what?</div>
          <div style={{ fontSize:12, color:P.inkDim, fontWeight:700, marginTop:2 }}>just talk, we'll figure it out later ♡</div>
        </div>
      </div>
      <div style={{ margin:'8px 16px', flex:1, borderRadius:24, background:P.surface, border:`1.5px solid ${P.surfaceHi}`,
        padding:18, display:'flex', flexDirection:'column', position:'relative', overflow:'hidden', minHeight:0 }}>
        <div style={{ position:'absolute', top:10, right:12, opacity:0.5 }}><Sparkle size={12} color={P.accent}/></div>
        <textarea ref={taRef} value={text} onChange={e => setText(e.target.value)}
          placeholder='e.g. "mike and i split apps, we each had an entree, i had 2 drinks and he had 1"'
          style={{ flex:1, background:'transparent', border:'none', outline:'none', resize:'none',
            color:P.ink, fontFamily:'"Nunito",system-ui', fontSize:18, fontWeight:600, lineHeight:1.5, letterSpacing:-0.1 }}/>
        <div style={{ display:'flex', justifyContent:'flex-end', marginTop:8, paddingTop:10, borderTop:`1px dashed ${P.surfaceHi}` }}>
          <div style={{ fontSize:11, color:P.inkFaint, fontWeight:700 }}>{text.length} chars</div>
        </div>
      </div>
      <div style={{ padding:'12px 20px', paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 28px)', flexShrink:0 }}>
        <KawaiiButton onClick={handleSave} disabled={!canSave}>
          {saving ? 'saving…' : canSave ? 'save receipt ♡' : 'keep going (3+ chars)'}
        </KawaiiButton>
      </div>
    </div>
  );
}

// SCREEN: CONFIRM
// ═══════════════════════════════════════════════════════════════════
function ConfirmScreen({ uploaded, uploadError, isOnline, onDone }) {
  const mood = uploaded ? 'wow' : 'happy';
  const headline = uploaded ? 'saved & synced!' : 'saved locally ♡';
  const sub = uploaded
    ? 'off it goes — the math gremlins will sort it out.'
    : uploadError
      ? "saved here for now — will retry when back online."
      : isOnline
        ? "server's asleep — tucked away safely, will sync next time."
        : "we'll tuck it away until you're back on wifi.";

  return (
    <div style={{ position:'absolute', inset:0,
      background:`radial-gradient(80% 60% at 50% 30%,${P.bg2} 0%,${P.bg} 80%)`,
      display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <SparkleField density="med"/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:20, position:'relative', zIndex:2, padding:'0 28px' }}>
        <div style={{ position:'relative', animation:'popIn 420ms cubic-bezier(.2,1.4,.3,1)' }}>
          <div style={{ position:'absolute', inset:-24, borderRadius:999, background:`radial-gradient(circle,${P.primary}30 0%,transparent 70%)` }}/>
          <div style={{ animation:'bob 3s ease-in-out infinite', position:'relative' }}>
            <Sushi size={150} mood={mood}/>
          </div>
          <div style={{ position:'absolute', top:-10, right:-20, animation:'twinkle 1.4s ease-in-out infinite' }}><Sparkle size={20} color={P.accent}/></div>
          <div style={{ position:'absolute', bottom:20, left:-30, animation:'twinkle 1.6s ease-in-out infinite 0.3s' }}><Sparkle size={14} color={P.accent2}/></div>
          <div style={{ position:'absolute', top:40, right:-30, animation:'twinkle 1.8s ease-in-out infinite 0.7s' }}><Heart size={14} color={P.primary}/></div>
        </div>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontSize:34, fontWeight:900, color:P.ink, letterSpacing:-0.6, lineHeight:1.05 }}>{headline}</div>
          <div style={{ fontSize:15, color:P.inkDim, marginTop:10, fontWeight:600, lineHeight:1.4, maxWidth:280, margin:'10px auto 0' }}>{sub}</div>
        </div>
        <div style={{ fontSize:13, color:P.inkFaint, fontWeight:600, textAlign:'center' }}>
          {uploaded ? 'synced to your server' : 'in the offline queue'}

        {uploadError && (
          <div style={{ fontSize:11, color:P.warn, fontWeight:700, textAlign:'center', maxWidth:280, opacity:0.8 }}>

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [config,       setConfig]       = useState(getConfig);
  const [screen,       setScreen]       = useState('home');
  const [photo,        setPhoto]        = useState(null);
  const [pendingCount, setPendingCount] = useState(0);
  const [isOnline,     setIsOnline]     = useState(navigator.onLine);
  const [lastUploadOk, setLastUploadOk] = useState(false);
  const [uploadError,  setUploadError]  = useState(null);

  const backendUrl = config.backendUrl;

  const refreshPending = useCallback(async () => {
    const count = await dbCountByStatus('pending');
    setPendingCount(count);
  }, []);

  useEffect(() => {
    const goOnline = async () => {
      setIsOnline(true);
      const n = await syncPendingIfOnline(backendUrl);
      if (n > 0) refreshPending();
    };
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    refreshPending();
    if (navigator.onLine) syncPendingIfOnline(backendUrl).then(n => n > 0 && refreshPending());
    return () => {
      window.removeEventListener('online',  goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, [refreshPending, backendUrl]);

  const handleSave = async (description) => {
    const id = `rcpt_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    const record = { id, photo, description, timestamp: new Date().toISOString(), status: 'pending' };
    await dbPut(record);
    let uploadedOk = false;
    if (isOnline && backendUrl) {
      try {
        await uploadReceipt(record, backendUrl);
        await dbPut({ ...record, status: 'uploaded' });
        uploadedOk = true;
      } catch (e) {
        const isNetworkError = e instanceof TypeError || e.message.toLowerCase().includes('fetch');
        setUploadError(isNetworkError ? null : e.message);
      }
    }
    setLastUploadOk(uploadedOk);
    await refreshPending();
    setScreen('confirm');
  };

  const handleDone = async () => {
    setPhoto(null); setUploadError(null); setLastUploadOk(false);
    setScreen('home');
    await refreshPending();
  };

  // First-run onboarding
  if (!config.name) {
    return (
      <div style={{ position:'fixed', inset:0, overflow:'hidden', background:P.bg, fontFamily:'"Nunito",system-ui' }}>
        <OnboardingScreen onDone={() => setConfig(getConfig())}/>
      </div>
    );
  }

  return (
    <div style={{ position:'fixed', inset:0, overflow:'hidden', background:P.bg, fontFamily:'"Nunito",system-ui' }}>
      {screen === 'home'       && <HomeScreen       pendingCount={pendingCount} isOnline={isOnline} name={config.name} onNew={() => setScreen('camera')} onSettings={() => setScreen('settings')}/>}
      {screen === 'settings'   && <SettingsScreen   currentConfig={config} onSave={c => { setConfig(c); setScreen('home'); }} onBack={() => setScreen('home')}/>}
      {screen === 'camera'     && <CameraScreen     onCapture={d => { setPhoto(d); setScreen('describe'); }} onBack={() => setScreen('home')} onPermissionDenied={() => setScreen('permission')}/>}
      {screen === 'describe'   && <DescribeScreen   photo={photo} onSave={handleSave} onBack={() => setScreen('camera')}/>}
      {screen === 'confirm'    && <ConfirmScreen    uploaded={lastUploadOk} uploadError={uploadError} isOnline={isOnline} onDone={handleDone}/>}
      {screen === 'permission' && <PermissionScreen onBack={() => setScreen('home')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
